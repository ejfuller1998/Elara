<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elara — Business OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9B77A;
  --gold-dim: rgba(201,183,122,0.15);
  --gold-border: rgba(201,183,122,0.25);
  --night: #08080E;
  --night-2: #0F0F18;
  --night-3: #14141F;
  --night-4: #1C1C2A;
  --night-5: #242435;
  --surface: #F8F7F4;
  --surface-2: #F0EEE9;
  --surface-3: #E8E5DE;
  --ink: #0E0E16;
  --ink-2: #3A3A4A;
  --ink-3: #6B6B7E;
  --ink-4: #9B9BAA;
  --white: #FFFFFF;
  --cyber: #7F77DD;
  --cyber-dim: rgba(127,119,221,0.12);
  --cyber-border: rgba(127,119,221,0.25);
  --green: #3B8C5A;
  --green-dim: rgba(59,140,90,0.12);
  --red: #C0392B;
  --red-dim: rgba(192,57,43,0.1);
  --amber: #D4870A;
  --amber-dim: rgba(212,135,10,0.12);
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --sidebar-w: 230px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--night);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--night-5); border-radius: 4px; }

/* ══════════════════════════════════════
   AUTH SCREEN
══════════════════════════════════════ */
#auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--night);
  position: relative;
  overflow: hidden;
}

#auth-screen::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(201,183,122,0.06) 0%, transparent 70%);
  top: -100px; left: -100px;
  pointer-events: none;
}

#auth-screen::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(127,119,221,0.05) 0%, transparent 70%);
  bottom: -50px; right: -50px;
  pointer-events: none;
}

.auth-box {
  width: 420px;
  padding: 48px;
  background: var(--night-2);
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  position: relative;
  z-index: 1;
  animation: fadeUp 0.6s cubic-bezier(0.4,0,0.2,1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.auth-logo {
  text-align: center;
  margin-bottom: 36px;
}

.auth-logo-mark {
  font-family: var(--font-display);
  font-size: 42px;
  font-weight: 300;
  color: var(--gold);
  letter-spacing: 0.15em;
  line-height: 1;
}

.auth-logo-sub {
  font-size: 10px;
  color: var(--ink-4);
  letter-spacing: 0.25em;
  margin-top: 6px;
  font-weight: 300;
}

.auth-label {
  font-size: 11px;
  color: var(--ink-4);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  font-weight: 500;
}

.auth-input {
  width: 100%;
  background: var(--night-3);
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--white);
  outline: none;
  transition: border-color var(--transition);
  margin-bottom: 16px;
}

.auth-input:focus {
  border-color: var(--gold-border);
}

.auth-input::placeholder { color: var(--ink-3); }

.auth-btn {
  width: 100%;
  background: var(--gold);
  border: none;
  border-radius: var(--radius-sm);
  padding: 13px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  color: var(--night);
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: opacity var(--transition), transform var(--transition);
  margin-top: 8px;
}

.auth-btn:hover { opacity: 0.9; }
.auth-btn:active { transform: scale(0.99); }

.auth-error {
  font-size: 12px;
  color: #E07070;
  margin-top: 10px;
  text-align: center;
  min-height: 18px;
}

.auth-divider {
  border: none;
  border-top: 0.5px solid rgba(255,255,255,0.06);
  margin: 24px 0;
}

.auth-hint {
  font-size: 11px;
  color: var(--ink-3);
  text-align: center;
  line-height: 1.7;
}

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
#app {
  display: none;
  min-height: 100vh;
  background: var(--surface);
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--night);
  border-right: 0.5px solid rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-logo {
  padding: 28px 24px 24px;
  border-bottom: 0.5px solid rgba(255,255,255,0.05);
}

.sidebar-logo-mark {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 300;
  color: var(--gold);
  letter-spacing: 0.12em;
}

.sidebar-logo-sub {
  font-size: 9px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.2em;
  margin-top: 3px;
}

.sidebar-user {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 0.5px solid rgba(255,255,255,0.05);
}

.sidebar-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 500;
  flex-shrink: 0;
}

.avatar-ej { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-border); }
.avatar-al { background: var(--green-dim); color: var(--green); border: 1px solid rgba(59,140,90,0.3); }
.avatar-jd { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(212,135,10,0.3); }
.avatar-jj { background: var(--cyber-dim); color: var(--cyber); border: 1px solid var(--cyber-border); }

.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name { font-size: 13px; color: var(--white); font-weight: 500; }
.sidebar-user-role { font-size: 10px; color: var(--ink-3); margin-top: 1px; }

.sidebar-nav { padding: 12px 0; flex: 1; }

.nav-section-label {
  font-size: 9px;
  color: rgba(255,255,255,0.18);
  letter-spacing: 0.15em;
  padding: 12px 24px 6px;
  font-weight: 500;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px 9px 24px;
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  border-radius: 0;
  transition: color var(--transition), background var(--transition);
  position: relative;
  user-select: none;
}

.nav-item:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.03); }

.nav-item.active {
  color: var(--white);
  background: rgba(255,255,255,0.05);
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 4px; bottom: 4px;
  width: 2px;
  background: var(--gold);
  border-radius: 0 2px 2px 0;
}

.nav-item svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }

.nav-badge {
  margin-left: auto;
  background: var(--gold);
  color: var(--night);
  font-size: 9px;
  font-weight: 500;
  padding: 2px 6px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}

.nav-badge.cyber { background: var(--cyber); color: var(--white); }

.sidebar-bottom {
  padding: 16px 20px;
  border-top: 0.5px solid rgba(255,255,255,0.05);
}

.logout-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--ink-3);
  cursor: pointer;
  padding: 6px 4px;
  transition: color var(--transition);
}

.logout-btn:hover { color: rgba(255,255,255,0.5); }
.logout-btn svg { width: 13px; height: 13px; }

/* ── MAIN CONTENT ── */
.main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  background: var(--surface);
  display: flex;
  flex-direction: column;
}

.topbar {
  background: var(--white);
  border-bottom: 0.5px solid var(--surface-3);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-left { display: flex; flex-direction: column; gap: 2px; }
.topbar-title { font-size: 15px; font-weight: 500; color: var(--ink); }
.topbar-sub { font-size: 12px; color: var(--ink-3); }

.topbar-right { display: flex; align-items: center; gap: 12px; }

.role-pill {
  font-size: 10px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}

.role-owner { background: var(--gold-dim); color: var(--gold); border: 0.5px solid var(--gold-border); }
.role-ops { background: var(--green-dim); color: var(--green); border: 0.5px solid rgba(59,140,90,0.3); }
.role-closer { background: var(--amber-dim); color: var(--amber); border: 0.5px solid rgba(212,135,10,0.3); }
.role-cyber { background: var(--cyber-dim); color: var(--cyber); border: 0.5px solid var(--cyber-border); }

.topbar-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 500;
}

/* ── PAGE CONTENT ── */
.page { padding: 28px 32px; display: none; }
.page.active { display: block; }

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.section-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 0.02em;
}

.section-sub {
  font-size: 13px;
  color: var(--ink-3);
  margin-top: 2px;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all var(--transition);
  letter-spacing: 0.03em;
}

.btn-primary { background: var(--night); color: var(--gold); }
.btn-primary:hover { background: var(--night-3); }
.btn-gold { background: var(--gold); color: var(--night); }
.btn-gold:hover { opacity: 0.9; }
.btn-ghost { background: transparent; color: var(--ink-2); border: 0.5px solid var(--surface-3); }
.btn-ghost:hover { background: var(--surface-2); }
.btn-danger { background: var(--red-dim); color: var(--red); border: 0.5px solid rgba(192,57,43,0.2); }
.btn-danger:hover { background: rgba(192,57,43,0.18); }
.btn svg { width: 13px; height: 13px; }

/* ── CARDS ── */
.card {
  background: var(--white);
  border: 0.5px solid var(--surface-3);
  border-radius: var(--radius);
  padding: 20px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.card-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
}

.card-action {
  font-size: 11px;
  color: var(--gold);
  cursor: pointer;
  transition: opacity var(--transition);
}

.card-action:hover { opacity: 0.7; }

/* ── METRICS GRID ── */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.metric-card {
  background: var(--white);
  border: 0.5px solid var(--surface-3);
  border-radius: var(--radius);
  padding: 18px 20px;
}

.metric-label {
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
  margin-bottom: 8px;
}

.metric-value {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 0.02em;
  line-height: 1;
}

.metric-delta {
  font-size: 11px;
  color: var(--green);
  margin-top: 6px;
}

.metric-delta.neg { color: var(--red); }
.metric-delta.neutral { color: var(--ink-3); }

/* ── AI BRIEFING BAR ── */
.briefing-bar {
  background: var(--night);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.briefing-bar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-border), transparent);
}

.briefing-icon {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: var(--gold-dim);
  border: 0.5px solid var(--gold-border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.briefing-icon svg { width: 15px; height: 15px; color: var(--gold); }
.briefing-label { font-size: 9px; color: var(--gold); letter-spacing: 0.15em; font-weight: 500; margin-bottom: 5px; }
.briefing-body { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.6; }

/* ── TWO COL ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }

/* ── TAGS ── */
.tag {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 20px;
}

.tag-hot { background: #FEF0ED; color: #B03A20; }
.tag-warm { background: #FEF5E7; color: #9A5E0A; }
.tag-new { background: #EBF7EF; color: #2A7A47; }
.tag-cyber { background: #EEEDFE; color: #4A44A0; }
.tag-cold { background: var(--surface-2); color: var(--ink-3); }

/* ── STATUS PILLS ── */
.status {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 20px;
}

.status-pending { background: #FEF5E7; color: #9A5E0A; }
.status-approved { background: #EBF7EF; color: #2A7A47; }
.status-review { background: #EEF4FD; color: #2A5FA0; }
.status-denied { background: #FDEDEF; color: #992020; }
.status-signed { background: #EBF7EF; color: #2A7A47; }
.status-paid { background: var(--night); color: var(--gold); }
.status-sent { background: #EEF4FD; color: #2A5FA0; }

/* ── TABLE ROWS ── */
.table-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 0.5px solid var(--surface-2);
}

.table-row:last-child { border-bottom: none; }

.row-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 500;
  color: var(--ink-2);
  flex-shrink: 0;
}

.row-name { font-size: 13px; color: var(--ink); font-weight: 500; }
.row-sub { font-size: 11px; color: var(--ink-3); }
.row-right { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.row-value { font-size: 13px; font-weight: 500; color: var(--ink); }
.row-label { font-size: 10px; color: var(--ink-3); }

/* ── APPROVAL BANNER ── */
.approval-banner {
  background: var(--white);
  border: 0.5px solid var(--surface-3);
  border-left: 3px solid var(--gold);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}

.approval-text { font-size: 13px; color: var(--ink); font-weight: 500; }
.approval-sub { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
.approval-actions { margin-left: auto; display: flex; gap: 8px; }

/* ── KANBAN ── */
.kanban {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.k-col {
  background: var(--surface-2);
  border-radius: var(--radius);
  padding: 14px;
  min-height: 200px;
}

.k-col-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
}

.k-col-title { font-size: 11px; font-weight: 500; color: var(--ink-2); letter-spacing: 0.05em; }

.k-count {
  background: var(--white);
  border: 0.5px solid var(--surface-3);
  font-size: 10px;
  color: var(--ink-3);
  padding: 1px 6px;
  border-radius: 10px;
}

.k-card {
  background: var(--white);
  border: 0.5px solid var(--surface-3);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color var(--transition), transform var(--transition);
}

.k-card:hover { border-color: var(--gold-border); transform: translateY(-1px); }
.k-card-name { font-size: 12px; font-weight: 500; color: var(--ink); }
.k-card-co { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
.k-card-val { font-size: 12px; color: var(--ink-2); font-weight: 500; margin-top: 6px; }
.k-card-tag { margin-top: 6px; }

.k-card.hot { border-left: 2px solid #E07050; }
.k-card.cyber-lead { border-left: 2px solid var(--cyber); }

/* ── FORM ELEMENTS ── */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 11px; color: var(--ink-3); letter-spacing: 0.05em; margin-bottom: 6px; display: block; font-weight: 500; }

.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--surface);
  border: 0.5px solid var(--surface-3);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color var(--transition);
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--gold);
  background: var(--white);
}

.form-textarea { resize: vertical; min-height: 100px; }
.form-select { cursor: pointer; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(8,8,14,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 28px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalIn 0.25s cubic-bezier(0.4,0,0.2,1) both;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.97) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
  color: var(--ink);
}

.modal-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--surface-2);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-3);
  font-size: 16px;
  transition: background var(--transition);
}

.modal-close:hover { background: var(--surface-3); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--night);
  color: var(--white);

// ══════════════════════════════════════
// AUTH
// ══════════════════════════════════════
function handleLogin() {
  const user = document.getElementById('auth-user').value.trim().toLowerCase();
  const pass = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-error');

  if (USERS[user] && USERS[user].password === pass) {
    STATE.currentUser = USERS[user];
    errEl.textContent = '';
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    errEl.textContent = 'Invalid username or password.';
    document.getElementById('auth-pass').value = '';
  }
}

document.getElementById('auth-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('auth-pass').focus(); });
document.getElementById('auth-pass').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

function handleLogout() {
  STATE.currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('auth-user').value = '';
  document.getElementById('auth-pass').value = '';
}

// ══════════════════════════════════════
// INIT APP
// ══════════════════════════════════════
function initApp() {
  const u = STATE.currentUser;
  const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  // Sidebar user info
  const avatarEl = document.getElementById('sidebar-avatar');
  avatarEl.className = 'sidebar-avatar ' + u.avatarClass;
  avatarEl.textContent = u.initials;
  document.getElementById('sidebar-name').textContent = u.name;
  document.getElementById('sidebar-role-label').textContent = u.roleLabel;

  // Topbar
  document.getElementById('topbar-sub').textContent = today + ' · Good morning, ' + u.name;
  const rolePill = document.getElementById('topbar-role');
  rolePill.className = 'role-pill ' + u.rolePillClass;
  rolePill.textContent = u.roleLabel;
  const topAvatar = document.getElementById('topbar-avatar');
  topAvatar.className = 'topbar-avatar ' + u.avatarClass;
  topAvatar.textContent = u.initials;

  // Build nav
  buildNav(u.role);

  // Build pages
  buildPages(u.role);

  // Navigate to dashboard
  navigate('dashboard');
}

// ══════════════════════════════════════
// BUILD NAV
// ══════════════════════════════════════
function buildNav(role) {
  const nav = document.getElementById('sidebar-nav');
  const items = NAV[role];
  let html = '';
  items.forEach(item => {
    if (item.section) {
      html += `<div class="nav-section-label">${item.section}</div>`;
    } else {
      const badgeCount = item.badge ? item.badge() : 0;
      const badgeHtml = badgeCount > 0 ? `<span class="nav-badge ${item.badgeClass||''}">${badgeCount}</span>` : '';
      html += `<div class="nav-item" data-page="${item.id}" onclick="navigate('${item.id}')">
        ${icon(item.icon)}
        ${item.label}
        ${badgeHtml}
      </div>`;
    }
  });
  nav.innerHTML = html;
}

function updateNavBadges(role) {
  const items = NAV[role];
  items.forEach(item => {
    if (!item.id || !item.badge) return;
    const el = document.querySelector(`.nav-item[data-page="${item.id}"] .nav-badge`);
    const count = item.badge();
    if (el) { el.textContent = count; el.style.display = count > 0 ? '' : 'none'; }
  });
}

// ══════════════════════════════════════
// NAVIGATE
// ══════════════════════════════════════
function navigate(pageId) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.querySelector(`.nav-item[data-page="${pageId}"]`);
  if (navEl) navEl.classList.add('active');

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('page-' + pageId);
  if (page) {
    page.classList.add('active');
    const titles = { dashboard: 'Control room', leads: 'Opportunities', cyberleads: 'Cyber leads', pipeline: 'Pipeline', proposals: 'Proposals', invoices: 'Invoices', commissions: 'Commissions', clients: 'Client portals', team: 'Team', pricing: 'Pricing calculator', system: 'System health', activity: 'Activity log' };
    document.getElementById('topbar-title').textContent = titles[pageId] || pageId;
    page.scrollTop = 0;
  }
  updateNavBadges(STATE.currentUser.role);
}

// ══════════════════════════════════════
// BUILD ALL PAGES
// ══════════════════════════════════════
function buildPages(role) {
  const container = document.getElementById('pages-container');
  const pages = {
    owner:  ['dashboard','leads','pipeline','proposals','invoices','commissions','clients','team','pricing','emails','webvibe','webintake'],
    ops:    ['dashboard','system','activity','integrity','teamsnap','updatelog'],
    closer: ['dashboard','leads','pipeline','proposals','invoices','commissions','pricing','websitegrader','roiweb','packagebuilder','adtools','jalenprop','jalenobjection','webvibe','webintake'],
    cyber:  ['dashboard','leads','cyberleads','pipeline','proposals','invoices','commissions','pricing','cyberscanner','cyberroi','vulntracker','cybertools','scorecard','jjprop','jjobjection','webvibe','webintake'],
  };
  let html = '';
  pages[role].forEach(p => {
    html += `<div class="page" id="page-${p}">${renderPage(p, role)}</div>`;
  });
  container.innerHTML = html;
  // Attach canvas listeners for signature pads after render
  setTimeout(initSignaturePads, 100);
}

function renderPage(pageId, role) {
  switch(pageId) {
    case 'dashboard':   return renderDashboard(role);
    case 'leads':       return renderLeads(role);
    case 'cyberleads':  return renderCyberLeads();
    case 'pipeline':    return renderPipeline(role);
    case 'proposals':   return renderProposals(role);
    case 'invoices':    return renderInvoices(role);
    case 'commissions': return renderCommissions(role);
    case 'clients':     return renderClients();
    case 'team':        return renderTeam(role);
    case 'pricing':     return renderPricing(role);
    case 'system':      return renderSystem();
    case 'activity':    return renderActivity();
    case 'integrity':   return renderIntegrity();
    case 'teamsnap':    return renderTeamSnap();
    case 'updatelog':   return renderUpdateLog();
    case 'emails':      return renderEmailTemplates();
    case 'webvibe':     return renderWebVibe();
    case 'webintake':   return renderWebIntake();
    case 'cyberscanner': return renderCyberScanner();
    case 'cyberroi':    return renderCyberROI();
    case 'vulntracker': return renderVulnTracker();
    case 'cybertools':  return renderCyberTools();
    case 'scorecard':   return renderScorecard();
    case 'jjprop':      return renderJJProposal();
    case 'jjobjection': return renderObjectionHandler('cyber');
    case 'websitegrader': return renderWebsiteGrader();
    case 'roiweb':      return renderROIWeb();
    case 'packagebuilder': return renderPackageBuilder();
    case 'adtools':     return renderAdTools();
    case 'jalenprop':   return renderJalenProposal();
    case 'jalenobjection': return renderObjectionHandler('closer');
    default:            return '<div class="page"><p>Coming soon</p></div>';
  }
}

function renderLeadsTable(leads, role) {

          <th style="text-align:left;font-size:10px;color:var(--ink-3);font-weight:500;letter-spacing:0.08em;padding:12px 8px">INDUSTRY</th>
          <th style="text-align:left;font-size:10px;color:var(--ink-3);font-weight:500;letter-spacing:0.08em;padding:12px 8px">VALUE</th>
          <th style="text-align:left;font-size:10px;color:var(--ink-3);font-weight:500;letter-spacing:0.08em;padding:12px 8px">STATUS</th>
          <th style="text-align:left;font-size:10px;color:var(--ink-3);font-weight:500;letter-spacing:0.08em;padding:12px 8px">ASSIGNED</th>

        </tr>
      </thead>
      <tbody>
        ${leads.map(l => `
        <tr style="border-bottom:0.5px solid var(--surface-2);transition:background 0.15s" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''">
          <td style="padding:12px 20px">
            <div style="font-size:13px;font-weight:500;color:var(--ink)">${l.name}</div>
            <div style="font-size:11px;color:var(--ink-3)">${l.company}</div>
          </td>
          <td style="padding:12px 8px;font-size:12px;color:var(--ink-2)">${l.industry}</td>
          <td style="padding:12px 8px;font-size:13px;font-weight:500;color:var(--ink)">$${l.value.toLocaleString()}</td>
          <td style="padding:12px 8px"><span class="${l.isCyber?'tag tag-cyber':l.status==='hot'?'tag tag-hot':l.status==='warm'?'tag tag-warm':'tag tag-new'}">${l.isCyber?'Cyber':l.status.charAt(0).toUpperCase()+l.status.slice(1)}</span></td>

          <td style="padding:12px 8px"><span class="status status-${l.stage==='proposal'?'approved':l.stage==='lead'?'review':'pending'}">${l.stage==='proposal'?'Proposal sent':l.stage.charAt(0).toUpperCase()+l.stage.slice(1)}</span></td>

          </td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function filterLeads(query, role) {
  const u = STATE.currentUser;
  let leads = role === 'owner' ? STATE.leads : STATE.leads.filter(l => l.assigned === u.username);
  if (query) leads = leads.filter(l => l.name.toLowerCase().includes(query.toLowerCase()) || l.company.toLowerCase().includes(query.toLowerCase()) || l.industry.toLowerCase().includes(query.toLowerCase()));
  document.getElementById('leads-table-' + role).innerHTML = renderLeadsTable(leads, role);
}

function filterLeadsByStatus(status, role) {
  const u = STATE.currentUser;
  let leads = role === 'owner' ? STATE.leads : STATE.leads.filter(l => l.assigned === u.username);
  if (status) leads = leads.filter(l => l.status === status);
  document.getElementById('leads-table-' + role).innerHTML = renderLeadsTable(leads, role);
}

function calcResultHTML(isOwner, value, costs) {
  if (isOwner) {
    const profit = value - costs;
    const margin = value > 0 ? Math.round((profit / value) * 100) : 0;
    const commission = value * 0.2;
    const net = profit - commission;
    return `
    <div style="font-size:10px;color:var(--gold);letter-spacing:0.12em;margin-bottom:16px">MARGIN BREAKDOWN</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div><div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:4px">DEAL VALUE</div><div style="font-family:var(--font-display);font-size:22px;color:var(--white)">$${value.toLocaleString()}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:4px">PROFIT MARGIN</div><div style="font-family:var(--font-display);font-size:22px;color:${margin>=60?'#6BCF8A':margin>=40?'var(--gold)':'#E07070'}">${margin}%</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:4px">CLOSER COMMISSION</div><div style="font-size:18px;color:rgba(255,255,255,0.6)">-$${commission.toLocaleString()}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:4px">YOUR NET</div><div style="font-family:var(--font-display);font-size:22px;color:var(--gold)">$${net.toLocaleString()}</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(margin,100)}%"></div></div>
    <div style="font-size:11px;color:rgba(255,255,255,0.35);margin-top:8px">${margin>=60?'Excellent margin — price is strong':'margin < 60% — consider adjusting'}</div>`;
  } else {
    const comm = value * 0.2;
    return `
    <div style="font-size:10px;color:var(--gold);letter-spacing:0.12em;margin-bottom:12px">YOUR POTENTIAL EARNINGS</div>
    <div class="comm-amount">$${comm.toLocaleString()}</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-top:8px">on a $${value.toLocaleString()} deal</div>
    <div style="margin-top:16px;padding-top:16px;border-top:0.5px solid rgba(255,255,255,0.08)">
      <div style="font-size:12px;color:rgba(255,255,255,0.4)">Close 3 deals like this = <span style="color:var(--gold)">$${(comm*3).toLocaleString()}</span> this month</div>
    </div>`;
  }
}

function calcUpdate(role) {
  const isOwner = role === 'owner';
  const value = parseFloat(document.getElementById('calc-value')?.value) || 0;
  const costs = isOwner ? (parseFloat(document.getElementById('calc-costs')?.value) || 0) : 0;
  const select = document.getElementById('calc-service');
  if (select) document.getElementById('calc-value').value = select.value;
  const el = document.getElementById('calc-result');
  if (el) el.innerHTML = calcResultHTML(isOwner, value, costs);
}

function initSignaturePads() {
  document.querySelectorAll('canvas[id^="sig-canvas"]').forEach(canvas => {
    if (canvas._initialized) return;
    canvas._initialized = true;
    const ctx = canvas.getContext('2d');
    let drawing = false;
    ctx.strokeStyle = '#0E0E16';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    canvas.addEventListener('mousedown', e => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
    canvas.addEventListener('mousemove', e => { if (!drawing) return; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); });
    canvas.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('mouseleave', () => drawing = false);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const t = e.touches[0]; const r = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(t.clientX-r.left, t.clientY-r.top); }, {passive:false});
    canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const t = e.touches[0]; const r = canvas.getBoundingClientRect(); ctx.lineTo(t.clientX-r.left, t.clientY-r.top); ctx.stroke(); }, {passive:false});
    canvas.addEventListener('touchend', () => drawing = false);
  });
}

function clearCanvas(id) {
  const canvas = document.getElementById(id);
  if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function switchSigTab(type, who) {
  document.querySelectorAll('.sig-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`sig-draw-${who}`).style.display = type==='draw' ? 'block' : 'none';
  document.getElementById(`sig-type-${who}`).style.display = type==='type' ? 'block' : 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.style.display = 'none', 3500);
}

function refreshCurrentPage() {
  const activeNav = document.querySelector('.nav-item.active');
  if (!activeNav) return;
  const pageId = activeNav.dataset.page;
  const page = document.getElementById('page-' + pageId);
  if (page) {
    page.innerHTML = renderPage(pageId, STATE.currentUser.role);
    setTimeout(initSignaturePads, 100);
  }
  updateNavBadges(STATE.currentUser.role);
}

function selectEmail(idx) {
  document.querySelectorAll('#email-list > div').forEach((el,i) => {

    el.querySelector('div').style.color = i===idx?'var(--white)':'var(--ink)';
  });
  document.getElementById('email-preview-panel').innerHTML = renderEmailPreview(idx);
}
function copyEmail(idx) { const b = document.getElementById('email-body-edit')?.value||EMAIL_TEMPLATES[idx].body; navigator.clipboard.writeText(b).then(()=>showToast('Email copied')); }

  const photos=document.getElementById('wi-photos')?.value||'';
  const pages=['home','about','services','contact','gallery','blog','booking','testimonials','faq','portfolio'].filter(p=>document.getElementById('wi-page-'+p)?.checked).map(p=>p.charAt(0).toUpperCase()+p.slice(1));
  const tones=[...selectedTones].join(', ')||'Professional';
  const today=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

function calcROIResult(revenue,industryMult,employees,dataMult) { const baseCost=200000; const breachCost=Math.round(baseCost*industryMult*dataMult*(1+employees*0.01)); const downtime=Math.round(revenue*0.15); const reputation=Math.round(revenue*0.08); const legal=Math.round(breachCost*0.2); const total=breachCost+downtime+reputation+legal; const auditCost=5500; const protection=Math.round((total/auditCost)*10)/10; return `<div style="font-size:10px;color:var(--gold);letter-spacing:0.12em;margin-bottom:16px">BREACH RISK EXPOSURE</div><div style="font-family:var(--font-display);font-size:38px;color:var(--red);letter-spacing:0.02em">$${total.toLocaleString()}</div><div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:16px">estimated cost of a single breach</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px"><div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:rgba(255,255,255,0.5)">Incident response + recovery</span><span style="color:var(--white)">$${breachCost.toLocaleString()}</span></div><div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:rgba(255,255,255,0.5)">Business downtime loss</span><span style="color:var(--white)">$${downtime.toLocaleString()}</span></div><div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:rgba(255,255,255,0.5)">Reputation damage</span><span style="color:var(--white)">$${reputation.toLocaleString()}</span></div><div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:rgba(255,255,255,0.5)">Legal and compliance fines</span><span style="color:var(--white)">$${legal.toLocaleString()}</span></div></div><div style="border-top:0.5px solid rgba(255,255,255,0.1);padding-top:14px"><div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:6px">Upscale audit cost</div><div style="font-size:22px;color:var(--gold);font-family:var(--font-display)">$${auditCost.toLocaleString()}</div><div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px">Protects against $${total.toLocaleString()} in risk</div><div style="font-size:13px;color:var(--gold);margin-top:8px;font-weight:500">That is ${protection}x ROI on day one.</div></div>`; }
function calcROI() { const revenue=parseFloat(document.getElementById('roi-revenue')?.value)||500000; const industry=parseFloat(document.getElementById('roi-industry')?.value)||1.2; const employees=parseFloat(document.getElementById('roi-employees')?.value)||10; const data=parseFloat(document.getElementById('roi-data')?.value)||1.5; const el=document.getElementById('roi-result'); if(el)el.innerHTML=calcROIResult(revenue,industry,employees,data); }

r(--surface-2)"><td style="padding:12px 20px;font-size:13px;font-weight:500;color:var(--ink)">${v.client}</td><td style="padding:12px 8px;font-size:12px;color:var(--ink-2)">${v.title}</td><td style="padding:12px 8px"><span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;background:${v.severity==='critical'?'var(--red-dim)':v.severity==='high'?'var(--amber-dim)':'var(--green-dim)'};color:${v.severity==='critical'?'var(--red)':v.severity==='high'?'var(--amber)':'var(--green)'}">${v.severity.toUpperCase()}</span></td><td style="padding:12px 8px"><span class="status status-${v.status==='fixed'?'approved':v.status==='in-progress'?'review':'denied'}">${v.status==='in-progress'?'In progress':v.status.charAt(0).toUpperCase()+v.status.slice(1)}</span></td><td style="padding:12px 8px;font-size:12px;color:var(--ink-3)">${v.found}</td></tr>`).join('')}</tbody></table></div>`; }

function renderCyberTools() {
  return `<div class="section-header"><div><div class="section-title">Security tools</div><div class="section-sub">Quick tools to run before and during client meetings</div></div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card"><div class="card-header"><div class="card-title">Password strength tester</div></div><div class="form-group"><label class="form-label">TEST A PASSWORD</label><input class="form-input" id="pwd-test" type="text" placeholder="Type any password..." oninput="testPassword()"></div><div id="pwd-result"></div></div>
    <div class="card"><div class="card-header"><div class="card-title">2FA audit checklist</div></div><div style="font-size:12px;color:var(--ink-3);margin-bottom:12px">Ask the client — check what they have enabled</div>${['Google Workspace / Gmail','Microsoft 365','Banking and finance portals','Website hosting account','Domain registrar','Social media accounts','CRM or business software','Remote access / VPN'].map(item=>`<label style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--surface-2);cursor:pointer"><input type="checkbox" style="accent-color:var(--cyber)"><span style="font-size:13px;color:var(--ink-2)">${item}</span></label>`).join('')}</div>
    <div class="card"><div class="card-header"><div class="card-title">Social engineering risk quiz</div></div><div style="font-size:12px;color:var(--ink-3);margin-bottom:12px">Walk the client through these questions</div>${['Do employees click links in emails without verifying the sender?','Has the company received suspicious emails asking for login credentials?','Do employees use personal devices for work email?','Are employees trained to verify phone requests for sensitive info?','Does the company have a policy for reporting suspicious activity?'].map(q=>`<div style="padding:10px 0;border-bottom:0.5px solid var(--surface-2)"><div style="font-size:12px;color:var(--ink-2);margin-bottom:8px">${q}</div><div style="display:flex;gap:8px"><button onclick="this.style.background='var(--red-dim)';this.style.color='var(--red)'" style="padding:4px 12px;border-radius:20px;font-size:11px;border:0.5px solid var(--surface-3);background:var(--surface);color:var(--ink-3);cursor:pointer">Yes — risk</button><button onclick="this.style.background='var(--green-dim)';this.style.color='var(--green)'" style="padding:4px 12px;border-radius:20px;font-size:11px;border:0.5px solid var(--surface-3);background:var(--surface);color:var(--ink-3);cursor:pointer">No — secure</button></div></div>`).join('')}</div>
    <div class="card"><div class="card-header"><div class="card-title">Network exposure quiz</div></div><div style="font-size:12px;color:var(--ink-3);margin-bottom:12px">Generates exposure summary</div>${['Do remote workers access company systems from home networks?','Does the company use public WiFi for business?','Are default router passwords still in use?','Is there a guest WiFi network separate from business WiFi?','Are security patches applied automatically?'].map(q=>`<div style="padding:10px 0;border-bottom:0.5px solid var(--surface-2)"><div style="font-size:12px;color:var(--ink-2);margin-bottom:8px">${q}</div><div style="display:flex;gap:8px"><button onclick="this.style.background='var(--red-dim)';this.style.color='var(--red)'" style="padding:4px 12px;border-radius:20px;font-size:11px;border:0.5px solid var(--surface-3);background:var(--surface);color:var(--ink-3);cursor:pointer">Yes</button><button onclick="this.style.background='var(--green-dim)';this.style.color='var(--green)'" style="padding:4px 12px;border-radius:20px;font-size:11px;border:0.5px solid var(--surface-3);background:var(--surface);color:var(--ink-3);cursor:pointer">No</button></div></div>`).join('')}</div>

function testPassword() { const pwd=document.getElementById('pwd-test')?.value||''; const el=document.getElementById('pwd-result'); if(!pwd){el.innerHTML='';return;} let score=0; if(pwd.length>=8)score++; if(pwd.length>=12)score++; if(/[A-Z]/.test(pwd))score++; if(/[0-9]/.test(pwd))score++; if(/[^A-Za-z0-9]/.test(pwd))score++; const levels=[{label:'Extremely weak',color:'var(--red)',crack:'Less than 1 second'},{label:'Very weak',color:'var(--red)',crack:'A few seconds'},{label:'Weak',color:'var(--amber)',crack:'A few minutes'},{label:'Moderate',color:'var(--amber)',crack:'Several hours'},{label:'Strong',color:'var(--green)',crack:'Years'},{label:'Very strong',color:'var(--green)',crack:'Centuries'}]; const l=levels[Math.min(score,5)]; el.innerHTML=`<div style="background:var(--surface);border-radius:var(--radius-sm);padding:12px;margin-top:8px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;font-weight:500;color:${l.color}">${l.label}</span><span style="font-size:12px;color:var(--ink-3)">Crack time: ${l.crack}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${score*20}%;background:${l.color}"></div></div></div>`; }

  return `<div class="section-header"><div><div class="section-title">Security scorecard</div><div class="section-sub">Generate a branded risk score — hand this to the prospect before you pitch</div></div></div>

    <div class="card"><div class="card-header"><div class="card-title">Score inputs</div></div><div class="form-group"><label class="form-label">COMPANY NAME</label><input class="form-input" id="sc-company" placeholder="Prospect company name" oninput="updateScorecard()"></div>${[{id:'sc-ssl',label:'SSL certificate valid and current',weight:10},{id:'sc-firewall',label:'Firewall properly configured',weight:20},{id:'sc-2fa',label:'Two-factor authentication enabled',weight:15},{id:'sc-patches',label:'Systems patched and updated',weight:20},{id:'sc-backup',label:'Regular data backups in place',weight:15},{id:'sc-email',label:'Email SPF/DKIM/DMARC configured',weight:10},{id:'sc-training',label:'Staff security training completed',weight:10}].map(item=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--surface-2)"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--ink-2)"><input type="checkbox" id="${item.id}" style="accent-color:var(--green)" onchange="updateScorecard()"> ${item.label}</label><span style="font-size:11px;color:var(--ink-3)">+${item.weight}pts</span></div>`).join('')}</div>
    <div id="scorecard-output">${renderScorecardOutput('',0)}</div>

}
function renderScorecardOutput(company,score) { const grade=score>=90?'A':score>=75?'B':score>=60?'C':score>=40?'D':'F'; const color=score>=75?'var(--green)':score>=50?'var(--amber)':'var(--red)'; const label=score>=90?'Excellent':score>=75?'Good':score>=60?'Fair':score>=40?'Poor':'Critical Risk'; return `<div class="comm-card"><div style="font-size:10px;color:var(--gold);letter-spacing:0.12em;margin-bottom:8px">SECURITY SCORECARD</div><div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:16px">${company||'[Company Name]'}</div><div style="font-family:var(--font-display);font-size:72px;color:${color};line-height:1;margin-bottom:8px">${grade}</div><div style="font-size:22px;color:var(--white);margin-bottom:4px">${score}/100</div><div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:20px">${label}</div><div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:${score}%;background:${color}"></div></div>${score<75?`<div style="background:rgba(192,57,43,0.15);border-radius:var(--radius-sm);padding:12px;margin-bottom:14px"><div style="font-size:12px;color:rgba(255,255,255,0.7);line-height:1.6">This business has significant security gaps. Upscale's audit addresses every item flagged above.</div></div>`:`<div style="background:var(--green-dim);border-radius:var(--radius-sm);padding:12px;margin-bottom:14px"><div style="font-size:12px;color:rgba(255,255,255,0.7);line-height:1.6">Good baseline. A full audit identifies deeper vulnerabilities.</div></div>`}<div style="font-size:10px;color:rgba(255,255,255,0.3)">Prepared by Upscale Software Solutions · ${new Date().toLocaleDateString()}</div><button class="btn btn-gold" style="width:100%;justify-content:center;margin-top:14px" onclick="navigator.clipboard.writeText('Security Scorecard: ${company} — Grade ${grade} (${score}/100). Prepared by Upscale Software Solutions.').then(()=>showToast('Scorecard copied'))">Copy scorecard summary</button></div>`; }
function updateScorecard() { const company=document.getElementById('sc-company')?.value||''; const checks=['sc-ssl','sc-firewall','sc-2fa','sc-patches','sc-backup','sc-email','sc-training']; const weights=[10,20,15,20,15,10,10]; let score=0; checks.forEach((id,i)=>{if(document.getElementById(id)?.checked)score+=weights[i];}); document.getElementById('scorecard-output').innerHTML=renderScorecardOutput(company,score); }

function renderJJProposal() {

function generateJJProposal() { const company=document.getElementById('jjp-company')?.value||'[Company]'; const contact=document.getElementById('jjp-contact')?.value||'there'; const industry=document.getElementById('jjp-industry')?.value; const vulns=document.getElementById('jjp-vulns')?.value||'several critical vulnerabilities'; const service=document.getElementById('jjp-service')?.value; const el=document.getElementById('jjp-output'); el.style.display='block'; el.innerHTML=`<div class="card"><div class="card-header"><div class="card-title">Generated proposal</div><button class="btn btn-primary" onclick="copyProposal('jjp-proposal-text')">Copy</button></div><textarea id="jjp-proposal-text" style="width:100%;background:var(--surface);border:0.5px solid var(--surface-3);border-radius:var(--radius-sm);padding:16px;font-family:var(--font-body);font-size:13px;color:var(--ink);line-height:1.8;min-height:480px;outline:none;resize:vertical">CYBERSECURITY PROPOSAL\n${company} · ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}\n\nDear ${contact},\n\nThank you for taking the time to meet with me. Based on our assessment of ${company}'s current security posture, I want to be direct — what we found requires immediate attention.\n\nWHAT WE FOUND\n\nDuring our initial assessment, we identified ${vulns}. For a ${industry} firm of your size, these vulnerabilities represent significant exposure. The average cost of a data breach for a small business in your industry exceeds $200,000.\n\nWHAT WE RECOMMEND\n\n${service}\n\nThis engagement covers:\n· Full network and system vulnerability scan\n· External and internal threat assessment\n· Remediation of all critical and high-severity findings\n· Written security report with prioritized action plan\n· 30-day post-remediation check-in\n\nINVESTMENT\n\n${service}\n\nNEXT STEPS\n\nReply to this email or call me directly. We can begin within 5 business days.\n\nJJ\nCybersecurity Closer\nUpscale Software Solutions\nTupelo, MS</textarea></div>`; }

const OBJECTIONS = {
  cyber: [
    { obj:'We already have IT', resp:`That is great — and IT handles day-to-day operations. What we do is different. We identify vulnerabilities your IT team may not have the time, tools, or specialized training to find. Most breaches happen inside businesses that already have IT support. We are not replacing them — we are adding a layer they cannot provide.` },
    { obj:"We can't afford it right now", resp:`I understand — and I respect that. But let me ask you something: if a breach happened tomorrow, could you afford $200,000 in recovery costs, downtime, and legal exposure? The audit is $5,500. That is not an expense — it is insurance. You do not wait until your house burns down to buy fire coverage.` },
    { obj:"We've never been hacked", resp:`That is exactly what every business says before they get hit. The businesses that get breached are not unlucky — they are just the ones attackers found first. Not being hacked yet does not mean you are secure. It means you have not been targeted yet.` },
    { obj:"We're too small to be a target", resp:`Small businesses are actually the number one target right now because attackers know you are less protected than large corporations. 43% of all cyberattacks target small businesses. Your size is not protection — it is an invitation.` },
    { obj:"Let me think about it", resp:`Absolutely — I respect that. But I want to be honest with you: the vulnerabilities we found are not waiting. Every day they are open is a day someone could walk through that door. When would you like to reconnect — is Thursday or Friday better?` },
    { obj:"We already have antivirus", resp:`Antivirus is like a seatbelt — it helps, but it will not stop a head-on collision. Modern attacks bypass antivirus completely. We are talking about network-level vulnerabilities, open ports, email spoofing, and social engineering — none of which antivirus touches.` },
  ],
  closer: [
    { obj:'I already have a website', resp:`That is a great starting point. The question is — is your website working for you or just existing? Most small business websites have no clear call to action, score under 50 on speed tests, and do not rank for a single local search term. I would love to run a quick audit right now and show you exactly what is costing you business.` },
    { obj:"I tried ads before and they didn't work", resp:`I hear that a lot — and it is almost never the ads that failed, it is the setup. Were they targeting the right audience? Did traffic go to an optimized landing page? Was there a follow-up sequence? Bad execution does not mean ads do not work — it means they were not done right.` },
    { obj:"I don't have the budget", resp:`Understood. What is one new client worth to your business? If your average client is worth $1,500 and we bring you three new clients a month, the website pays for itself in the first 30 days. We are not talking about a cost — we are talking about a revenue channel.` },
    { obj:"I can build it myself", resp:`You absolutely can — and your time is worth a lot. The question is whether your time is better spent running your business or learning web design, SEO, and conversion optimization. Our clients who tried DIY first all say the same thing: they wish they had called us earlier.` },
    { obj:"I need to talk to my partner", resp:`Of course — I would actually love to get them on a call too. They will have questions I can answer in real time and it makes the decision cleaner for everyone. Are they available this week? Even 20 minutes would be enough.` },
    { obj:"Your price is too high", resp:`I appreciate you being direct. We do not compete on price because we do not deliver average results. The question is not what it costs, it is what it returns. If I can show you a clear path to $30,000 in new revenue this year, does the investment still feel too high?` },
  ],
};
const selectedObjState = {};
function renderObjectionHandler(role) { const objs=OBJECTIONS[role]; const title=role==='cyber'?'Cyber objection handler':'Sales objection handler'; return `<div class="section-header"><div><div class="section-title">${title}</div><div class="section-sub">Click an objection — get the perfect response instantly</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px"><div><div style="font-size:12px;font-weight:500;color:var(--ink-3);letter-spacing:0.08em;margin-bottom:12px">COMMON OBJECTIONS</div>${objs.map((o,i)=>`<div onclick="showObjection(${i},'${role}')" id="obj-${role}-${i}" style="padding:12px 14px;background:var(--white);border:0.5px solid var(--surface-3);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all 0.15s" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="if(selectedObjState['${role}']!==${i})this.style.borderColor='var(--surface-3)'"><div style="font-size:13px;color:var(--ink)">"${o.obj}"</div></div>`).join('')}</div><div id="obj-response-${role}" style="display:none"></div></div>`; }
function showObjection(idx,role) { selectedObjState[role]=idx; document.querySelectorAll(`[id^="obj-${role}-"]`).forEach((el,i)=>{el.style.background=i===idx?'var(--night)':'var(--white)';el.querySelector('div').style.color=i===idx?'var(--white)':'var(--ink)';el.style.borderColor=i===idx?'transparent':'var(--surface-3)';}); const o=OBJECTIONS[role][idx]; const el=document.getElementById(`obj-response-${role}`); el.style.display='block'; el.innerHTML=`<div class="comm-card"><div style="font-size:10px;color:var(--gold);letter-spacing:0.12em;margin-bottom:12px">YOUR RESPONSE</div><div style="font-size:13px;color:rgba(255,255,255,0.75);line-height:1.8;margin-bottom:16px">"${o.obj}"</div><hr style="border:none;border-top:0.5px solid rgba(255,255,255,0.08);margin-bottom:16px"><textarea style="width:100%;background:transparent;border:none;outline:none;font-family:var(--font-body);font-size:13px;color:rgba(255,255,255,0.85);line-height:1.8;min-height:200px;resize:none" id="obj-text-${role}-${idx}">${o.resp}</textarea><button class="btn btn-gold" style="width:100%;justify-content:center;margin-top:12px" onclick="navigator.clipboard.writeText(document.getElementById('obj-text-${role}-${idx}').value).then(()=>showToast('Response copied'))">Copy response</button></div>`; }

function runWebGrader() { const url=document.getElementById('wg-url')?.value||'example.com'; const type=document.getElementById('wg-type')?.value; const el=document.getElementById('wg-results'); el.innerHTML=`<div style="font-size:12px;color:var(--ink-3);padding:10px 0">Grading ${url}...</div>`; setTimeout(()=>{ const categories=[{name:'Design and visual appeal',score:Math.floor(Math.random()*15)+10,max:25,tip:'Outdated design, poor use of white space, no visual hierarchy'},{name:'Mobile responsiveness',score:Math.floor(Math.random()*10)+5,max:25,tip:'Layout breaks on mobile — 65% of local searches are on phones'},{name:'Page speed',score:Math.floor(Math.random()*8)+4,max:20,tip:'Images not compressed, loads in 8+ seconds'},{name:'Local SEO',score:Math.floor(Math.random()*8)+4,max:20,tip:'Missing meta titles, not ranking for key terms'},{name:'Call to action',score:Math.floor(Math.random()*4)+2,max:10,tip:'No clear CTA above the fold'}]; const total=categories.reduce((s,c)=>s+c.score,0); const maxTotal=categories.reduce((s,c)=>s+c.max,0); const pct=Math.round((total/maxTotal)*100); el.innerHTML=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:22px;font-weight:500;color:${pct<50?'var(--red)':pct<75?'var(--amber)':'var(--green)'}">${pct}/100</span><span class="tag ${pct<50?'tag-hot':pct<75?'tag-warm':'tag-new'}">${pct<50?'Needs major work':pct<75?'Below average':'Average'}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct<50?'var(--red)':'var(--amber)'}"></div></div></div>${categories.map(c=>`<div style="padding:10px 0;border-bottom:0.5px solid var(--surface-2)"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;font-weight:500;color:var(--ink)">${c.name}</span><span style="font-size:12px;color:var(--ink-3)">${c.score}/${c.max}</span></div><div class="progress-bar" style="margin-bottom:4px"><div class="progress-fill" style="width:${Math.round(c.score/c.max*100)}%"></div></div><div style="font-size:11px;color:var(--ink-3)">${c.tip}</div></div>`).join('')}`; const pitch=document.getElementById('wg-pitch'); pitch.style.display='block'; pitch.innerHTML=`<div class="comm-card"><div style="font-size:10px;color:var(--gold);letter-spacing:0.12em;margin-bottom:12px">YOUR PITCH ANGLE</div><div style="font-size:22px;font-family:var(--font-display);color:var(--white);margin-bottom:8px">${url}</div><div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:16px">scores ${pct}/100 — below the ${type} industry average of 71</div><div style="font-size:13px;color:rgba(255,255,255,0.8);line-height:1.8;margin-bottom:16px">"I ran your website through our grader before this meeting. You scored ${pct} out of 100. The biggest issues are your mobile experience and local SEO — right now you are invisible to anyone searching for ${type.toLowerCase()} services in Tupelo."</div><button class="btn btn-gold" style="width:100%;justify-content:center" onclick="navigator.clipboard.writeText('${url} scores ${pct}/100. Key issues: mobile, speed, local SEO. Upscale can fix all three.').then(()=>showToast('Pitch copied'))">Copy pitch line</button></div>`; },2000); }

function calcWebROI() { const clientVal=parseFloat(document.getElementById('roiw-type')?.value)||800; const clients=parseFloat(document.getElementById('roiw-clients')?.value)||3; const invest=parseFloat(document.getElementById('roiw-invest')?.value)||4200; const el=document.getElementById('roiw-result'); if(el)el.innerHTML=calcWebROIResult(clientVal,clients,invest); }

  return `<div class="section-header"><div><div class="section-title">Ad and SEO tools</div><div class="section-sub">Research, write, and plan before the meeting — show up as the expert</div></div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card"><div class="card-header"><div class="card-title">Keyword research</div></div><div class="form-group"><label class="form-label">BUSINESS TYPE</label><input class="form-input" id="kw-type" placeholder="e.g. Dentist, lawyer, plumber..."></div><div class="form-group"><label class="form-label">CITY</label><input class="form-input" id="kw-city" value="Tupelo, MS"></div><button class="btn btn-primary" style="width:100%;justify-content:center" onclick="runKeywords()">Find keywords</button><div id="kw-results" style="margin-top:16px"></div></div>
    <div class="card"><div class="card-header"><div class="card-title">Google Ad copy generator</div></div><div class="form-group"><label class="form-label">SERVICE</label><input class="form-input" id="ad-service" placeholder="e.g. Emergency dental care"></div><div class="form-group"><label class="form-label">CITY</label><input class="form-input" id="ad-city" value="Tupelo, MS"></div><div class="form-group"><label class="form-label">UNIQUE SELLING POINT</label><input class="form-input" id="ad-usp" placeholder="e.g. Same-day appointments..."></div><button class="btn btn-primary" style="width:100%;justify-content:center" onclick="generateAdCopy()">Generate ad copy</button><div id="ad-results" style="margin-top:16px"></div></div>
    <div class="card"><div class="card-header"><div class="card-title">Content calendar generator</div></div><div class="form-group"><label class="form-label">BUSINESS TYPE</label><input class="form-input" id="cal-type" placeholder="e.g. Dental office"></div><button class="btn btn-primary" style="width:100%;justify-content:center" onclick="generateCalendar()">Generate 30-day calendar</button><div id="cal-results" style="margin-top:16px"></div></div>
    <div class="card"><div class="card-header"><div class="card-title">Landing page outline</div></div><div class="form-group"><label class="form-label">SERVICE BEING ADVERTISED</label><input class="form-input" id="lp-service" placeholder="e.g. Emergency dental care"></div><div class="form-group"><label class="form-label">TARGET CUSTOMER</label><input class="form-input" id="lp-customer" placeholder="e.g. Adults with dental pain in Tupelo"></div><button class="btn btn-primary" style="width:100%;justify-content:center" onclick="generateLandingPage()">Build outline</button><div id="lp-results" style="margin-top:16px"></div></div>
  </div>`;
}
function runKeywords() { const type=document.getElementById('kw-type')?.value||'dentist'; const city=document.getElementById('kw-city')?.value||'Tupelo, MS'; const el=document.getElementById('kw-results'); el.innerHTML=`<div style="font-size:12px;color:var(--ink-3)">Researching...</div>`; setTimeout(()=>{ const kws=[{kw:`${type} ${city}`,vol:'480/mo',comp:'Medium',cpc:'$4.20'},{kw:`best ${type} near me`,vol:'320/mo',comp:'High',cpc:'$5.80'},{kw:`${type} open now`,vol:'210/mo',comp:'Low',cpc:'$2.90'},{kw:`emergency ${type} ${city}`,vol:'140/mo',comp:'Low',cpc:'$6.50'},{kw:`affordable ${type} ${city}`,vol:'90/mo',comp:'Low',cpc:'$3.10'}]; el.innerHTML=kws.map(k=>`<div style="display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--surface-2);font-size:12px"><div style="color:var(--ink)">${k.kw}</div><div style="color:var(--ink-3)">${k.vol}</div><span class="tag ${k.comp==='Low'?'tag-new':k.comp==='Medium'?'tag-warm':'tag-hot'}">${k.comp}</span><div style="color:var(--green);font-weight:500">${k.cpc}</div></div>`).join(''); },1200); }
function generateAdCopy() { const service=document.getElementById('ad-service')?.value||'dental care'; const city=document.getElementById('ad-city')?.value||'Tupelo, MS'; const usp=document.getElementById('ad-usp')?.value||'trusted local experts'; const el=document.getElementById('ad-results'); setTimeout(()=>{ el.innerHTML=[{h1:`${service} in ${city}`,h2:`${usp}`,h3:`Call Now — Same Day Available`,desc:`Professional ${service} you can trust. ${usp}. Serving ${city} and surrounding areas.`},{h1:`Top-Rated ${service}`,h2:`${city}'s Trusted Choice`,h3:`Book Today`,desc:`Quality ${service} from ${city} locals you trust. ${usp}. Schedule now.`}].map((ad,i)=>`<div style="background:var(--surface);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px"><div style="font-size:10px;color:var(--ink-3);margin-bottom:6px">AD VARIANT ${i+1}</div><div style="font-size:12px;color:#1a0dab;margin-bottom:2px">${ad.h1} | ${ad.h2} | ${ad.h3}</div><div style="font-size:11px;color:var(--ink-3)">${ad.desc}</div><button class="btn btn-ghost" style="margin-top:8px;padding:4px 10px;font-size:11px" onclick="navigator.clipboard.writeText('${ad.h1} | ${ad.h2} | ${ad.h3}').then(()=>showToast('Ad copy copied'))">Copy</button></div>`).join(''); },1000); }
function generateCalendar() { const el=document.getElementById('cal-results'); setTimeout(()=>{ el.innerHTML=['Before and after client result','Team behind-the-scenes photo','Answer a common customer question','Share a 5-star Google review','Educational tip related to your service','Did you know fact about your industry','Community spotlight or local event'].map((p,i)=>`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--surface-2)"><div style="font-size:11px;color:var(--ink-3);min-width:40px">Day ${(i+1)*4}</div><div style="font-size:12px;color:var(--ink-2)">${p}</div></div>`).join('')+`<button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:10px;font-size:11px" onclick="showToast('Full calendar copied')">Copy full calendar</button>`; },800); }
function generateLandingPage() { const service=document.getElementById('lp-service')?.value||'your service'; const el=document.getElementById('lp-results'); setTimeout(()=>{ el.innerHTML=[{section:'Hero',desc:`Headline addressing the main pain point. Subheadline with your solution. CTA above the fold.`},{section:'Trust signals',desc:'Google rating, years in business, number of clients served, certifications.'},{section:'Problem / Solution',desc:`What your customers are struggling with. How ${service} solves it specifically.`},{section:'Service details',desc:"What's included, how it works, timeline, what to expect."},{section:'Social proof',desc:'3-5 testimonials with names and photos.'},{section:'FAQ',desc:'Top 5 objections answered. Removes friction before they call.'},{section:'Final CTA',desc:'Repeat the offer. Phone, form, or booking.'}].map(s=>`<div style="padding:8px 0;border-bottom:0.5px solid var(--surface-2)"><div style="font-size:12px;font-weight:500;color:var(--ink)">${s.section}</div><div style="font-size:11px;color:var(--ink-3);margin-top:3px">${s.desc}</div></div>`).join(''); },800); }

// ══════════════════════════════════════
// JALEN PROPOSAL
// ══════════════════════════════════════
function renderJalenProposal() {
  return `<div class="section-header"><div><div class="section-title">Web proposal writer</div><div class="section-sub">Fill in the details — Elara writes the full proposal</div></div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="card"><div class="form-group"><label class="form-label">CLIENT COMPANY</label><input class="form-input" id="jp-company" placeholder="e.g. Tupelo Dental Group"></div><div class="form-group"><label class="form-label">CONTACT NAME</label><input class="form-input" id="jp-contact" placeholder="Decision maker's name"></div><div class="form-group"><label class="form-label">WHAT THEY NEED</label><textarea class="form-textarea" id="jp-needs" placeholder="e.g. New website, slow site, no Google presence..." style="min-height:70px"></textarea></div><div class="form-group"><label class="form-label">PACKAGE / SERVICE</label><select class="form-select" id="jp-service"><option>Essential Website — $1,800</option><option>Growth Package — $3,500</option><option>Authority Package — $6,500</option><option>SEO Package — $1,400/mo</option><option>Google Ads Management — $950/mo</option></select></div><div class="form-group"><label class="form-label">WEBSITE GRADE SCORE (if ran)</label><input class="form-input" id="jp-score" type="number" placeholder="e.g. 38"></div><button class="btn btn-gold" style="width:100%;justify-content:center" onclick="generateJalenProposal()">Generate proposal</button></div>
    <div id="jp-output" style="display:none"></div>
  </div>`;
}
function generateJalenProposal() { const company=document.getElementById('jp-company')?.value||'[Company]'; const contact=document.getElementById('jp-contact')?.value||'there'; const needs=document.getElementById('jp-needs')?.value||'improve their digital presence'; const service=document.getElementById('jp-service')?.value; const score=document.getElementById('jp-score')?.value; const el=document.getElementById('jp-output'); el.style.display='block'; el.innerHTML=`<div class="card"><div class="card-header"><div class="card-title">Generated proposal</div><button class="btn btn-primary" onclick="copyProposal('jp-proposal-text')">Copy</button></div><textarea id="jp-proposal-text" style="width:100%;background:var(--surface);border:0.5px solid var(--surface-3);border-radius:var(--radius-sm);padding:16px;font-family:var(--font-body);font-size:13px;color:var(--ink);line-height:1.8;min-height:480px;outline:none;resize:vertical">WEB DESIGN PROPOSAL\n${company} · ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}\n\nDear ${contact},\n\nThank you for your time. I have done my homework on ${company} and I want to be direct about what I found.\n\nCURRENT SITUATION\n\n${score?`Your website currently scores ${score}/100 on our grading system — below the local business average of 71. `:''}Based on our review, ${company} needs to ${needs}.\n\nWHAT WE PROPOSE\n\n${service}\n\nThis includes:\n· Professional design built for your specific industry\n· Mobile-optimized and fast loading on all devices\n· Local SEO optimization so you rank when customers search for you\n· Clear calls to action designed to convert visitors into clients\n· Google Analytics setup\n\nINVESTMENT\n\n${service}\n\nWe move fast. Once confirmed we begin within 5 business days. Most projects complete in 3 weeks.\n\nNEXT STEPS\n\nReply here or call me directly.\n\nJalen\nCloser — Web and Advertising\nUpscale Software Solutions\nTupelo, MS</textarea></div>`; }
function copyProposal(id) { navigator.clipboard.writeText(document.getElementById(id)?.value||'').then(()=>showToast('Proposal copied')); }

</script>
